name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-client.txt -r requirements-dev.txt

      - name: Build quality control exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name QualityControlSystem main.py

      - name: Build quality control debug exe
        run: |
          pyinstaller --noconfirm --clean --onefile --console --name QualityControlSystem_Debug main.py

      - name: Build S7 PLC test tool exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name S7_PLC_Test_Tool --paths . --hidden-import shared --hidden-import shared.s7_plc_client --add-data "s7_plc_test_tool/config.ini;." --distpath s7_plc_test_tool/dist --workpath s7_plc_test_tool/build s7_plc_test_tool/main.py

      - name: Smoke test S7 PLC test tool
        shell: pwsh
        run: |
          $exe = Resolve-Path "s7_plc_test_tool/dist/S7_PLC_Test_Tool.exe"
          $process = Start-Process -FilePath $exe -PassThru
          try {
            Start-Sleep -Seconds 8
            if ($process.HasExited) {
              throw "S7_PLC_Test_Tool.exe exited during startup with code $($process.ExitCode)"
            }
            Write-Host "S7_PLC_Test_Tool.exe startup smoke test passed"
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload quality control artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityControlSystem-windows
          path: dist/QualityControlSystem.exe

      - name: Upload quality control debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityControlSystem-debug-windows
          path: dist/QualityControlSystem_Debug.exe

      - name: Upload S7 PLC test tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: S7_PLC_Test_Tool-windows
          path: s7_plc_test_tool/dist/S7_PLC_Test_Tool.exe

      - name: Publish latest Windows exe
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: windows-latest
          name: Windows Latest
          files: |
            dist/QualityControlSystem.exe
            dist/QualityControlSystem_Debug.exe
            s7_plc_test_tool/dist/S7_PLC_Test_Tool.exe
