name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-client.txt -r requirements-dev.txt

      - name: Run critical production tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m unittest tests.test_tool_worker tests.test_plc_magnet_flow tests.test_desktop_main_barcode

      - name: Build quality control exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name QualityControlSystem main.py

      - name: Build quality control debug exe
        run: |
          pyinstaller --noconfirm --clean --onefile --console --name QualityControlSystem_Debug main.py

      - name: Upload quality control artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityControlSystem-windows
          path: dist/QualityControlSystem.exe

      - name: Upload quality control debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityControlSystem-debug-windows
          path: dist/QualityControlSystem_Debug.exe

      - name: Remove deprecated S7 release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete-asset windows-latest S7_PLC_Test_Tool.exe --yes || true

      - name: Publish latest Windows exe
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: windows-latest
          name: Windows Latest
          files: |
            dist/QualityControlSystem.exe
            dist/QualityControlSystem_Debug.exe
