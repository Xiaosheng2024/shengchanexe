name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name QualityControlSystem main.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: QualityControlSystem-windows
          path: dist/QualityControlSystem.exe

      - name: Publish latest Windows exe
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: windows-latest
          name: Windows Latest
          files: dist/QualityControlSystem.exe
