name: PLC Magnet Test Tool Build

on:
  push:
    paths:
      - "plc_magnet_test_tool/**"
      - "shared/s7_plc_client.py"
      - "requirements-client.txt"
      - ".github/workflows/plc-magnet-tool-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plc-magnet-tool:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-client.txt -r requirements-dev.txt

      - name: Run magnet tool tests
        run: |
          python -m unittest tests.test_plc_magnet_test_tool

      - name: Build PLC magnet test tool
        shell: cmd
        run: call plc_magnet_test_tool\build_exe.bat

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "plc_magnet_test_tool/dist/PLC_Magnet_Test_Tool.exe"
          if (-not (Test-Path $exe)) {
            throw "PLC_Magnet_Test_Tool.exe was not generated"
          }
          if ((Get-Item $exe).Length -le 0) {
            throw "PLC_Magnet_Test_Tool.exe is empty"
          }

      - name: Upload standalone test tool
        uses: actions/upload-artifact@v4
        with:
          name: PLC_Magnet_Test_Tool-windows
          path: plc_magnet_test_tool/dist/PLC_Magnet_Test_Tool.exe
