name: PLC Magnet Test Tool Build

on:
  push:
    paths:
      - "plc_magnet_test_tool/**"
      - "shared/s7_plc_client.py"
      - "requirements-client.txt"
      - ".github/workflows/plc-magnet-tool-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plc-magnet-tool:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-client.txt -r requirements-dev.txt

      - name: Run magnet tool tests
        shell: pwsh
        run: |
          python -m unittest -v tests.test_plc_magnet_test_tool *>&1 |
            Tee-Object -FilePath magnet-test-output.txt
          $testExitCode = $LASTEXITCODE
          Get-Content magnet-test-output.txt >> $env:GITHUB_STEP_SUMMARY
          if ($testExitCode -ne 0) {
            exit $testExitCode
          }

      - name: Build PLC magnet test tool
        shell: cmd
        run: call plc_magnet_test_tool\build_exe.bat

      - name: Verify executable
        shell: pwsh
        run: |
          $exePath = "plc_magnet_test_tool/dist/PLC_Magnet_Test_Tool.exe"
          if (-not (Test-Path $exePath)) {
            throw "PLC_Magnet_Test_Tool.exe was not generated"
          }
          $exe = (Resolve-Path $exePath).Path
          if ((Get-Item $exe).Length -le 0) {
            throw "PLC_Magnet_Test_Tool.exe is empty"
          }
          $exeDir = Split-Path $exe -Parent
          Remove-Item "$exeDir/config.ini" -Force -ErrorAction SilentlyContinue
          Remove-Item "$exeDir/logs" -Recurse -Force -ErrorAction SilentlyContinue
          $otherCwd = Join-Path $env:RUNNER_TEMP "plc-magnet-other-cwd"
          New-Item -ItemType Directory -Path $otherCwd -Force | Out-Null
          $process = Start-Process `
            -FilePath $exe `
            -ArgumentList "--path-self-check" `
            -WorkingDirectory $otherCwd `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged path self-check failed with exit code $($process.ExitCode)"
          }
          if (-not (Test-Path "$exeDir/config.ini")) {
            throw "config.ini was not created next to the executable"
          }
          if (-not (Test-Path "$exeDir/logs/plc_magnet_test.log")) {
            throw "log file was not created next to the executable"
          }
          if (Test-Path "$otherCwd/config.ini") {
            throw "config.ini was incorrectly created under the working directory"
          }

      - name: Upload standalone test tool
        uses: actions/upload-artifact@v4
        with:
          name: PLC_Magnet_Test_Tool-windows
          path: plc_magnet_test_tool/dist/PLC_Magnet_Test_Tool.exe
